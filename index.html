<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dunk | Basquete</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏀%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c10; color: #e5e9f0; min-height: 100vh; }
        .site-header { background: #0f1115; border-bottom: 1px solid #20232a; padding: 0 32px; height: 70px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: baseline; gap: 4px; }
        .logo-name { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: #ffffff; }
        .logo-accent { font-weight: 500; color: #60a5fa; font-size: 13px; margin-left: 6px; }
        .status-badge { display: flex; align-items: center; gap: 8px; background: #181b22; padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
        .main-container { max-width: 1600px; margin: 0 auto; padding: 32px 32px 48px; }
        .control-card { background: #111317; border-radius: 20px; padding: 28px 32px; margin-bottom: 40px; border: 1px solid #22262f; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
        .field { flex: 1; min-width: 200px; }
        .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; color: #7e849b; }
        .field input, .field select { width: 100%; padding: 14px 18px; background: #0c0e13; border: 1.5px solid #252933; border-radius: 14px; color: #ffffff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .field input:focus, .field select:focus { outline: none; border-color: #60a5fa; background: #12141c; box-shadow: 0 0 0 3px rgba(96,165,250,0.1); }
        .btn { padding: 14px 28px; border: none; border-radius: 14px; font-weight: 600; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-secondary { background: #1f222b; color: #e2e8f0; border: 1px solid #2d313c; }
        .btn-secondary:hover { background: #2d313e; transform: translateY(-1px); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; transform: translateY(-1px); }
        .teams-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 32px; margin-bottom: 32px; }
        .rank-section, .history-section { background: #0f1117; border-radius: 24px; border: 1px solid #22262f; margin-top: 32px; overflow: hidden; }
        .section-title { padding: 20px 28px; border-bottom: 1px solid #1e2129; font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .team-card { background: #0f1117; border-radius: 24px; border: 1px solid #22262f; overflow: hidden; transition: all 0.2s; }
        .team-card:hover { border-color: #3b82f6; }
        .team-head { padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; border-bottom: 1px solid #1e2129; background: #0c0e14; }
        .team-id { display: flex; align-items: center; gap: 14px; }
        .team-badge { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; }
        .team-a .team-badge { background: #1e3a8a; }
        .team-b .team-badge { background: #9d174d; }
        .team-title { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
        .team-total { background: #080a0f; padding: 8px 20px; border-radius: 40px; font-size: 14px; font-weight: 600; color: #94a3b8; }
        .team-total strong { color: #facc15; font-size: 18px; margin: 0 4px; }
        .table-wrap { overflow-x: auto; padding: 20px 24px 28px; }
        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .stats-table th { text-align: center; padding: 14px 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #7e849b; }
        .stats-table td { padding: 14px 8px; text-align: center; background: #0b0d12; border-radius: 16px; }
        .player-name-col { text-align: left !important; font-weight: 600; color: #ffffff; cursor: pointer; }
        .player-name-col:hover { color: #60a5fa; text-decoration: underline; }
        .stat-value { font-weight: 700; font-size: 18px; }
        .pts-stat { color: #facc15; }
        .ast-stat { color: #60a5fa; }
        .reb-stat { color: #fb923c; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .stat-button { padding: 8px 14px; border: none; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; min-width: 56px; transition: all 0.15s; }
        .stat-button:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .btn-2pt { background: #10b981; color: white; }
        .btn-1pt { background: #34d399; color: #064e3b; }
        .btn-3pt { background: #f59e0b; color: white; }
        .btn-ast { background: #3b82f6; color: white; }
        .btn-reb { background: #f97316; color: white; }
        .btn-fg { background: #8b5cf6; color: white; }
        .btn-miss { background: #475569; color: white; }
        .btn-delete { background: #dc2626; color: white; padding: 8px 12px; }
        .empty-message { text-align: center; padding: 56px 24px; color: #60647a; }
        .rank-table { width: 100%; border-collapse: collapse; }
        .rank-table th, .rank-table td { padding: 14px 20px; text-align: center; border-bottom: 1px solid #1e2129; }
        .rank-table th { color: #7e849b; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        .rank-table tr:hover td { background: #0c0e14; }
        .rank-1 { color: #facc15; font-weight: 800; }
        .rank-2 { color: #94a3b8; font-weight: 700; }
        .rank-3 { color: #cd7f32; font-weight: 700; }
        .history-list { padding: 20px 28px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #1e2129; }
        .history-date { color: #60a5fa; font-weight: 500; }
        .history-score { font-weight: 700; }
        .history-highlight { color: #94a3b8; font-size: 13px; }
        .player-profile { background: #0f1117; border-radius: 24px; border: 1px solid #22262f; margin-bottom: 32px; padding: 28px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
        .profile-name { font-size: 28px; font-weight: 800; }
        .profile-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
        .profile-stat-card { background: #0b0d12; border-radius: 16px; padding: 16px; text-align: center; }
        .profile-stat-value { font-size: 28px; font-weight: 800; color: #facc15; }
        .profile-stat-label { font-size: 11px; text-transform: uppercase; color: #7e849b; margin-top: 6px; }
        .modal-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(6px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: #13161f; border-radius: 28px; padding: 32px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #3b82f6; }
        .modal-card h3 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 16px; justify-content: center; margin-top: 28px; }
        .modal-btn { padding: 11px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; }
        .modal-confirm { background: #dc2626; color: white; }
        .modal-cancel { background: #2d3748; color: white; }
        .alert-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(6px); z-index: 1001; align-items: center; justify-content: center; }
        .alert-card { background: #13161f; border-radius: 28px; padding: 32px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #f59e0b; }
        .alert-card h3 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #f59e0b; }
        .alert-btn { margin-top: 28px; padding: 11px 32px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; background: #3b82f6; color: white; }
        .back-btn { background: #1f222b; color: #e2e8f0; border: 1px solid #2d313c; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; margin-bottom: 24px; display: inline-block; }
        @media (max-width: 800px) { .main-container { padding: 20px; } .teams-layout { grid-template-columns: 1fr; } .team-title { font-size: 22px; } .stat-button { padding: 6px 10px; font-size: 11px; min-width: 48px; } .stat-value { font-size: 16px; } }
        @media (max-width: 550px) { .control-card { flex-direction: column; align-items: stretch; } .btn-group { gap: 6px; } .team-head { flex-direction: column; align-items: flex-start; } }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0a0c10; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="logo-area">
        <span class="logo-name">Dunk</span>
        <span class="logo-accent">Analytics</span>
    </div>
    <div class="status-badge">
        <div class="status-dot"></div>
        <span>Uptime</span>
    </div>
</header>

<div class="main-container" id="app">
    <div class="control-card">
        <div class="field">
            <label>Nome do jogador</label>
            <input type="text" id="playerName" placeholder="e.g., Jayson Tatum" autocomplete="off">
        </div>
        <div class="field">
            <label>Grupos</label>
            <select id="teamSelect">
                <option value="A">Grupo A</option>
                <option value="B">Grupo B</option>
            </select>
        </div>
        <button class="btn btn-primary" id="addBtn">+ Adicionar jogador</button>
        <button class="btn btn-secondary" id="resetBtn">⟳ Resetar</button>
        <button class="btn btn-success" id="saveGameBtn">💾 Salvar Jogo</button>
    </div>

    <div id="dynamicContent"></div>
</div>

<div id="customModal" class="modal-window">
    <div class="modal-card">
        <h3>Confirmar ação</h3>
        <p id="modalMessage" style="margin-top: 8px;">Você tem certeza?</p>
        <div class="modal-actions">
            <button class="modal-btn modal-confirm" id="modalConfirmBtn">Sim</button>
            <button class="modal-btn modal-cancel" id="modalCancelBtn">Cancelar</button>
        </div>
    </div>
</div>

<div id="alertModal" class="alert-window">
    <div class="alert-card">
        <h3>⚠️ Aviso</h3>
        <p id="alertMessage" style="margin-top: 8px;">Mensagem de aviso</p>
        <button class="alert-btn" id="alertOkBtn">OK</button>
    </div>
</div>

<script>
    let players = [];
    let gameHistory = [];
    let careerStats = [];
    let currentView = 'main';

    function loadData() {
        const storedPlayers = localStorage.getItem("dunk_players");
        const storedHistory = localStorage.getItem("dunk_history");
        const storedCareer = localStorage.getItem("dunk_career");
        if(storedPlayers) players = JSON.parse(storedPlayers);
        else players = [];
        if(storedHistory) gameHistory = JSON.parse(storedHistory);
        else gameHistory = [];
        if(storedCareer) careerStats = JSON.parse(storedCareer);
        else careerStats = [];
        render();
    }

    function saveData() {
        localStorage.setItem("dunk_players", JSON.stringify(players));
        localStorage.setItem("dunk_history", JSON.stringify(gameHistory));
        localStorage.setItem("dunk_career", JSON.stringify(careerStats));
    }

    function showAlert(message) {
        const alertModal = document.getElementById('alertModal');
        const alertMsg = document.getElementById('alertMessage');
        alertMsg.textContent = message;
        alertModal.style.display = 'flex';
        const okBtn = document.getElementById('alertOkBtn');
        const closeAlert = () => {
            alertModal.style.display = 'none';
            okBtn.removeEventListener('click', closeAlert);
        };
        okBtn.addEventListener('click', closeAlert);
    }

    function showConfirmModal(message, onConfirm) {
        const modal = document.getElementById('customModal');
        const msgElem = document.getElementById('modalMessage');
        msgElem.textContent = message;
        modal.style.display = 'flex';
        const confirmBtn = document.getElementById('modalConfirmBtn');
        const cancelBtn = document.getElementById('modalCancelBtn');
        const closeModal = () => {
            modal.style.display = 'none';
            confirmBtn.removeEventListener('click', handleConfirm);
            cancelBtn.removeEventListener('click', handleCancel);
        };
        const handleConfirm = () => { closeModal(); onConfirm(); };
        const handleCancel = () => { closeModal(); };
        confirmBtn.addEventListener('click', handleConfirm);
        cancelBtn.addEventListener('click', handleCancel);
    }

    function addPlayer() {
        const nameInput = document.getElementById("playerName");
        const name = nameInput.value.trim();
        const team = document.getElementById("teamSelect").value;
        if(name === "") { showAlert("Por favor, insira o nome do jogador."); return; }
        players.push({
            id: Date.now(),
            name: name,
            team: team,
            pts: 0, ast: 0, reb: 0, fgm: 0, fga: 0, tpm: 0, tpa: 0
        });
        const existingCareer = careerStats.find(c => c.name === name);
        if(!existingCareer) {
            careerStats.push({ name: name, team: team, totalPts: 0, totalAst: 0, totalReb: 0, games: 0 });
        }
        saveData();
        render();
        nameInput.value = "";
        nameInput.focus();
    }

    function updateStat(playerId, action) {
        const player = players.find(p => p.id === playerId);
        if(!player) return;
        switch(action) {
            case 'pts2': player.pts += 2; break;
            case 'pts1': player.pts += 1; break;
            case 'pts3': player.pts += 3; player.tpm += 1; player.tpa += 1; break;
            case 'ast': player.ast += 1; break;
            case 'reb': player.reb += 1; break;
            case 'fgm': player.fgm += 1; player.fga += 1; player.pts += 2; break;
            case 'fga': player.fga += 1; break;
            case 'tpa': player.tpa += 1; break;
        }
        saveData();
        render();
    }

    function deletePlayer(playerId, playerName) {
        showConfirmModal(`Remover o jogador "${playerName}" do painel?`, () => {
            players = players.filter(p => p.id !== playerId);
            saveData();
            render();
        });
    }

    function saveGame() {
        if(players.length === 0) { showAlert("Nenhum jogador para salvar."); return; }
        const teamAPts = players.filter(p => p.team === 'A').reduce((s,p) => s + p.pts, 0);
        const teamBPts = players.filter(p => p.team === 'B').reduce((s,p) => s + p.pts, 0);
        const topPlayer = [...players].sort((a,b) => b.pts - a.pts)[0];
        const gameRecord = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            scoreA: teamAPts,
            scoreB: teamBPts,
            highlight: topPlayer ? topPlayer.name : '-',
            snapshot: JSON.parse(JSON.stringify(players))
        };
        gameHistory.unshift(gameRecord);
        players.forEach(p => {
            let career = careerStats.find(c => c.name === p.name);
            if(career) {
                career.totalPts += p.pts;
                career.totalAst += p.ast;
                career.totalReb += p.reb;
                career.games += 1;
            } else {
                careerStats.push({ name: p.name, team: p.team, totalPts: p.pts, totalAst: p.ast, totalReb: p.reb, games: 1 });
            }
        });
        players.forEach(p => { p.pts = 0; p.ast = 0; p.reb = 0; p.fgm = 0; p.fga = 0; p.tpm = 0; p.tpa = 0; });
        saveData();
        render();
        showAlert("Jogo salvo com sucesso!");
    }

    function resetGame() {
        showConfirmModal("Resetar todas estatísticas da partida atual?", () => {
            players.forEach(p => { p.pts = 0; p.ast = 0; p.reb = 0; p.fgm = 0; p.fga = 0; p.tpm = 0; p.tpa = 0; });
            saveData();
            render();
        });
    }

    function viewPlayerProfile(playerName) {
        const player = players.find(p => p.name === playerName);
        const career = careerStats.find(c => c.name === playerName);
        if(!player) return;
        currentView = 'profile';
        renderProfile(player, career);
    }

    function goBack() {
        currentView = 'main';
        render();
    }

    function renderProfile(player, career) {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <button class="back-btn" onclick="goBack()">← Voltar</button>
            <div class="player-profile">
                <div class="profile-header">
                    <div class="profile-name">🏀 ${escapeHtml(player.name)}</div>
                    <div class="team-total">Grupo ${player.team}</div>
                </div>
                <h3 style="margin-bottom: 16px;">📊 Estatísticas da Partida</h3>
                <div class="profile-stats">
                    <div class="profile-stat-card"><div class="profile-stat-value">${player.pts}</div><div class="profile-stat-label">Pontos</div></div>
                    <div class="profile-stat-card"><div class="profile-stat-value">${player.ast}</div><div class="profile-stat-label">Assistências</div></div>
                    <div class="profile-stat-card"><div class="profile-stat-value">${player.reb}</div><div class="profile-stat-label">Rebotes</div></div>
                    <div class="profile-stat-card"><div class="profile-stat-value">${player.fgm}/${player.fga}</div><div class="profile-stat-label">FG</div></div>
                    <div class="profile-stat-card"><div class="profile-stat-value">${player.tpm}/${player.tpa}</div><div class="profile-stat-label">3PT</div></div>
                </div>
                ${career ? `
                    <h3 style="margin: 24px 0 16px;">🏆 Carreira (${career.games} jogos)</h3>
                    <div class="profile-stats">
                        <div class="profile-stat-card"><div class="profile-stat-value">${career.totalPts}</div><div class="profile-stat-label">Total Pontos</div></div>
                        <div class="profile-stat-card"><div class="profile-stat-value">${career.totalAst}</div><div class="profile-stat-label">Total AST</div></div>
                        <div class="profile-stat-card"><div class="profile-stat-value">${career.totalReb}</div><div class="profile-stat-label">Total REB</div></div>
                        <div class="profile-stat-card"><div class="profile-stat-value">${(career.totalPts / career.games).toFixed(1)}</div><div class="profile-stat-label">Média PTS</div></div>
                    </div>
                ` : '<p style="margin-top: 16px;">Sem dados de carreira</p>'}
            </div>
        `;
    }

    function renderRanking() {
        const ranking = [...careerStats].sort((a,b) => b.totalPts - a.totalPts);
        if(ranking.length === 0) return '<div class="empty-message">Sem dados para ranking</div>';
        return `
            <table class="rank-table">
                <thead><tr><th>#</th><th>Jogador</th><th>Grupo</th><th>Total PTS</th><th>Total AST</th><th>Total REB</th><th>Jogos</th><th>Média</th></tr></thead>
                <tbody>
                    ${ranking.map((r, idx) => {
                        let rankClass = '';
                        if(idx === 0) rankClass = 'rank-1';
                        else if(idx === 1) rankClass = 'rank-2';
                        else if(idx === 2) rankClass = 'rank-3';
                        const avg = r.games > 0 ? (r.totalPts / r.games).toFixed(1) : 0;
                        return `<tr>
                            <td class="${rankClass}">${idx + 1}º</td>
                            <td style="text-align:left; font-weight:600;">${escapeHtml(r.name)}</td>
                            <td>${r.team}</td>
                            <td class="pts-stat">${r.totalPts}</td>
                            <td>${r.totalAst}</td>
                            <td>${r.totalReb}</td>
                            <td>${r.games}</td>
                            <td>${avg}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        `;
    }

    function renderHistory() {
        if(gameHistory.length === 0) return '<div class="empty-message">Nenhum jogo salvo ainda</div>';
        return `<div class="history-list">
            ${gameHistory.map(g => `
                <div class="history-item">
                    <div><span class="history-date">${g.date}</span></div>
                    <div class="history-score">Grupo A ${g.scoreA} - ${g.scoreB} Grupo B</div>
                    <div class="history-highlight">🏆 Destaque: ${escapeHtml(g.highlight)}</div>
                </div>
            `).join('')}
        </div>`;
    }

    function renderTeam(teamLetter) {
        const teamPlayers = players.filter(p => p.team === teamLetter);
        const isTeamA = teamLetter === 'A';
        if(teamPlayers.length === 0) {
            return `<div class="team-card ${isTeamA ? 'team-a' : 'team-b'}">
                <div class="team-head"><div class="team-id"><div class="team-badge">${teamLetter}</div><div class="team-title">Grupo ${teamLetter}</div></div></div>
                <div class="empty-message"><div style="font-size: 42px; margin-bottom: 12px;">🏀</div><p>Nenhum jogador adicionado</p></div>
            </div>`;
        }
        const totalPts = teamPlayers.reduce((sum, p) => sum + p.pts, 0);
        const totalAst = teamPlayers.reduce((sum, p) => sum + p.ast, 0);
        const totalReb = teamPlayers.reduce((sum, p) => sum + p.reb, 0);
        return `<div class="team-card ${isTeamA ? 'team-a' : 'team-b'}">
            <div class="team-head">
                <div class="team-id"><div class="team-badge">${teamLetter}</div><div class="team-title">Grupo ${teamLetter}</div></div>
                <div class="team-total">TOTAL | <strong>${totalPts}</strong> PTS &nbsp; <strong>${totalAst}</strong> AST &nbsp; <strong>${totalReb}</strong> REB</div>
            </div>
            <div class="table-wrap"><table class="stats-table"><thead><tr><th>Jogador</th><th>PTS</th><th>AST</th><th>REB</th><th>FG</th><th>3PT</th><th>Ações</th></tr></thead>
            <tbody>${teamPlayers.map(p => {
                const fgPercent = p.fga === 0 ? '0' : ((p.fgm / p.fga) * 100).toFixed(0);
                const tpPercent = p.tpa === 0 ? '0' : ((p.tpm / p.tpa) * 100).toFixed(0);
                return `<tr>
                    <td class="player-name-col" onclick="viewPlayerProfile('${escapeHtml(p.name)}')">🏀 ${escapeHtml(p.name)}</td>
                    <td class="stat-value pts-stat">${p.pts}</td>
                    <td class="stat-value ast-stat">${p.ast}</td>
                    <td class="stat-value reb-stat">${p.reb}</td>
                    <td>${p.fgm}/${p.fga} <span style="font-size:11px; color:#94a3b8;">(${fgPercent}%)</span></td>
                    <td>${p.tpm}/${p.tpa} <span style="font-size:11px; color:#94a3b8;">(${tpPercent}%)</span></td>
                    <td><div class="btn-group">
                        <button class="stat-button btn-2pt" onclick="updateStat(${p.id}, 'pts2')">+2</button>
                        <button class="stat-button btn-1pt" onclick="updateStat(${p.id}, 'pts1')">+1</button>
                        <button class="stat-button btn-3pt" onclick="updateStat(${p.id}, 'pts3')">+3</button>
                        <button class="stat-button btn-ast" onclick="updateStat(${p.id}, 'ast')">AST</button>
                        <button class="stat-button btn-reb" onclick="updateStat(${p.id}, 'reb')">REB</button>
                        <button class="stat-button btn-fg" onclick="updateStat(${p.id}, 'fgm')">FG+</button>
                        <button class="stat-button btn-miss" onclick="updateStat(${p.id}, 'fga')">FG-</button>
                        <button class="stat-button btn-miss" onclick="updateStat(${p.id}, 'tpa')">3PT-</button>
                        <button class="stat-button btn-delete" onclick="deletePlayer(${p.id}, '${escapeHtml(p.name)}')">✕</button>
                    </div></td>
                </tr>`;
            }).join('')}</tbody></table></div>
        </div>`;
    }

    function renderMain() {
        return `
            <div class="teams-layout">${renderTeam("A") + renderTeam("B")}</div>
            <div class="rank-section"><div class="section-title">🏆 RANKING GERAL</div>${renderRanking()}</div>
            <div class="history-section"><div class="section-title">📜 HISTÓRICO DE PARTIDAS</div>${renderHistory()}</div>
        `;
    }

    function render() {
        const container = document.getElementById('dynamicContent');
        if(currentView === 'main') {
            container.innerHTML = renderMain();
        }
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    document.getElementById("addBtn").addEventListener("click", addPlayer);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.getElementById("saveGameBtn").addEventListener("click", saveGame);
    document.getElementById("playerName").addEventListener("keypress", function(e) { if(e.key === "Enter") addPlayer(); });

    window.updateStat = updateStat;
    window.deletePlayer = deletePlayer;
    window.viewPlayerProfile = viewPlayerProfile;
    window.goBack = goBack;

    loadData();
</script>
</body>
</html>
